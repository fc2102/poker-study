<!-- Quiz — preguntas de repaso -->
<div id="tab-quiz" class="section">
  <div class="section-title">PRÁCTICA</div>
  <div class="section-sub">Pon a prueba tu conocimiento</div>
  <div class="quiz-wrap">
    <div class="quiz-progress">
      <div>
        <div class="prog-text" id="quiz-prog-text">Pregunta 1 / 15</div>
        <div class="prog-bar-track"><div class="prog-bar-fill" id="quiz-prog-bar" style="width:0%"></div></div>
      </div>
      <div class="score-badge" id="quiz-score-badge">✓ 0 / ✗ 0</div>
    </div>
    <div id="quiz-container"></div>
    <div class="quiz-result" id="quiz-result">
      <div class="result-score" id="result-pct">—</div>
      <div class="result-label">de respuestas correctas</div>
      <div class="result-msg" id="result-msg">—</div>
      <button class="restart-btn" onclick="restartQuiz()">↺ Volver a empezar</button>
    </div>
  </div>
</div>
